#cloud-config
package_update: true
package_upgrade: false

packages:
  - epel-release
  - xfce4
  - xfce4-goodies
  - tigervnc-server
  - fluxbox

runcmd:
  # Create VNC directory
  - mkdir -p /root/.vnc
  
  # Create VNC xstartup file for AlmaLinux
  - |
    cat << 'EOF' > /root/.vnc/xstartup
    #!/bin/sh
    unset SESSION_MANAGER
    unset DBUS_SESSION_BUS_ADDRESS
    exec startxfce4
    EOF

  # Make script executable
  - chmod +x /root/.vnc/xstartup
