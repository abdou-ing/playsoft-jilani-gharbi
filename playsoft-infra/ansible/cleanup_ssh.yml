---
- name: Cleanup Proxmox SSH NAT
  hosts: proxmox
  become: true
  tasks:
    - name: Load Terraform output
      set_fact:
        tf: "{{ lookup('file', '/home/jilani/playsoft-jilani-gharbi/playsoft-infra/terraform-k8s/tf_output.json') | from_json }}"

    - name: Derive VM IDs from Terraform output
      set_fact:
        vm_ids_list: "{{ tf.ssh_vm_ids.value | flatten }}"

    - name: Remove ALL NAT PREROUTING rules for SSH VMs (any IP, by comment)
      shell: |
        while iptables -t nat -S PREROUTING | grep -q "SSH NAT for VM {{ item }}"; do
          iptables -t nat -S PREROUTING \
            | grep "SSH NAT for VM {{ item }}" \
            | head -1 \
            | sed 's/^-A/-D/' \
            | xargs iptables -t nat
        done
      loop: "{{ vm_ids_list }}"
      ignore_errors: true

    - name: Remove ALL FORWARD rules for SSH VMs (any IP, by comment)
      shell: |
        while iptables -S FORWARD | grep -q "Allow SSH to VM {{ item }}"; do
          iptables -S FORWARD \
            | grep "Allow SSH to VM {{ item }}" \
            | head -1 \
            | sed 's/^-A/-D/' \
            | xargs iptables
        done
      loop: "{{ vm_ids_list }}"
      ignore_errors: true

