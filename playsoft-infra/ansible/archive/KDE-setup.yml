---
- name: Configure KDE Desktop if enabled
  hosts: test_servers
  become: true

  vars_files:
    - vars.yml

  vars:
    kde_packages:
      - kde-plasma-desktop

  tasks:

    - name: Create KDE user
      user:
        name: "{{ kde_user }}"
        shell: /bin/bash
        groups: sudo
        append: true
        password: "{{ kde_password_plain | password_hash('sha512') }}"
        state: present
      when: KDE | bool

    # - name: Install KDE packages
    #   apt:
    #     name: "{{ kde_packages }}"
    #     state: present
    #     update_cache: true
    #   when: KDE | bool

    # - name: Enable SDDM display manager
    #   systemd:
    #     name: sddm
    #     enabled: true
    #   when: KDE | bool

    - name: Configure xRDP to start KDE
      copy:
        dest: /home/{{ kde_user }}/.xsession
        content: |
          exec startplasma-x11
        owner: "{{ kde_user }}"
        group: "{{ kde_user }}"
        mode: '0644'
      when: KDE | bool

    - name: Add KDE user to ssl-cert group
      user:
        name: "{{ kde_user }}"
        groups: ssl-cert
        append: true
      when: KDE | bool

    - name: Restart xRDP
      systemd:
        name: xrdp
        state: restarted
      when: KDE | bool
