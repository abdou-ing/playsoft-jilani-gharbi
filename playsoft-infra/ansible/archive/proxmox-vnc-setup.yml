---
- name: Configure VNC access on Proxmox VM (auto-increment & idempotent)
  hosts: proxmox
  become: yes
  gather_facts: true

  vars:
    vmid: "{{ tf.vm_id.value }}"  # VM ID from Terraform output
    start_vnc_port: 1                 
    max_vnc_port: 99                   
    node_name: playsoft-proxmox
    vm_conf_path: "/etc/pve/nodes/{{ node_name }}/qemu-server/{{ vmid }}.conf"

    check_config_files: false
    vm_configs_dir: "/etc/pve/nodes/{{ node_name }}/qemu-server"

  ######################################################################
  # HANDLERS
  ######################################################################
  handlers:
    - name: restart_vm
      command: /bin/bash -c "qm stop {{ vmid }} && qm start {{ vmid }}"

  ######################################################################
  # TASKS
  ######################################################################
  tasks:
    - name: Load Terraform output
      set_fact:
        tf: "{{ lookup('file', '~/playsoft-jilani-gharbi/playsoft-infra/terraform//modules/vnc-server/tf_output.json') | from_json }}"

    - name: Show starting parameters
      debug:
        msg:
          - "VMID          : {{ vmid }}"
          - "Start display : {{ start_vnc_port }}"
          - "Max display   : {{ max_vnc_port }}"
          - "Node          : {{ node_name }}"
          - "Runtime-only port scan with: ss -tulpn | grep :<port>"
      changed_when: false

######################################################################
# 1) AUTO‑DISCOVER FIRST FREE DISPLAY (increment +1 until free)
######################################################################

    - name: Copy VNC port scan script to Proxmox
      copy:
        src: "{{ playbook_dir }}/../scripts/find_free_vnc.sh"
        dest: /usr/local/bin/find_free_vnc.sh
        mode: "0755"

    - name: Find first free VNC display
      command: "/usr/local/bin/find_free_vnc.sh {{ start_vnc_port }} {{ max_vnc_port }}"
      register: vnc_scan
      changed_when: false
      failed_when: vnc_scan.rc not in [0]

    - name: Fail if no free VNC display found in the specified range
      fail:
        msg: "No free VNC display found between :{{ start_vnc_port }} and :{{ max_vnc_port }} (ports 5900+N)."
      when: (vnc_scan.stdout | trim) == ""

    - name: Set chosen VNC display + TCP port
      set_fact:
        vnc_port: "{{ vnc_scan.stdout | trim | int }}"
        firewall_port: "{{ 5900 + (vnc_scan.stdout | trim | int) }}"
      changed_when: false

    - name: Display chosen free VNC port
      debug:
        msg: "Using free VNC display :{{ vnc_port }} (TCP {{ firewall_port }})"
      changed_when: false

    ######################################################################
    # 2) APPLY CONFIG TO THIS VM (only if not already set)
    ######################################################################
    # - name: Read VM config
    #   shell: "cat {{ vm_conf_path }} 2>/dev/null || true"
    #   args:
    #     executable: /bin/bash
    #   register: vm_conf
    #   changed_when: false

    # - name: Check if this VM already has the chosen port
    #   set_fact:
    #     vm_has_desired_vnc: "{{ ('-vnc 0.0.0.0:' ~ vnc_port) in (vm_conf.stdout | default('')) }}"
    #   changed_when: false

    - name: Apply VNC args on VM
      command: >
        qm set {{ vmid }} -args "-vnc 0.0.0.0:{{ vnc_port }}"
      #when: not vm_has_desired_vnc
      notify: restart_vm

    ######################################################################
    # 3) FIREWALL RULE FOR VNC PORT (only if not already open)
    ######################################################################
    - name: Allow VNC port through firewall (idempotent)
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "{{ firewall_port }}"
        jump: ACCEPT
        state: present
        ip_version: ipv4
      become: true
      notify: restart_vm
      #using ansible iptables 

    ######################################################################
    # 4) RESTART VM IF ANY CHANGE OCCURRED
    ######################################################################
    - name: Apply pending handlers (stop/start VM)
      meta: flush_handlers

    ######################################################################
    # 5) SUMMARY
    ######################################################################
    - name: Summary
      debug:
        msg:
          - "Final VNC display: :{{ vnc_port }}"
          - "Final TCP port   : {{ firewall_port }}"
          - "VM restarted only if config or firewall changed."
      changed_when: false