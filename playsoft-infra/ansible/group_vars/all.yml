---
# ──────────────────────────────────────────────
# Shared / global variables available to all hosts
# ──────────────────────────────────────────────

# Guacamole route name
guac_route: guacamole

# Guacamole admin credentials
auth_username: guacadmin
auth_password: guacadmin

# ─────────────────────────────────────────────────────────────
# Template config for auto-generated users.
# ─────────────────────────────────────────────────────────────
user_prefix: "candidat"
user_password_prefix: "candidat"
user_organization: "playsoft"
user_email_domain: "example.com"

connection_prefix: "exam"
vnc_hostname: "138.201.200.168"
vnc_base_port: 5910       # port = vnc_base_port + index (1-based)
win_rdp_base_port: 3301   # port = win_rdp_base_port + index (0-based)


win_user: "student"
win_password: "123456"

connection_type:
  - "vnc"
  - "ssh"
  - "win"
