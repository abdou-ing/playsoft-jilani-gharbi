---
# ---------------------------------------------------------------------------
# 00. Bootstrap: Load dynamic variables from Terraform
# ---------------------------------------------------------------------------
- name: "Bootstrap: Load dynamic inventory variables"
  hosts: all
  gather_facts: false
  tasks:
    - name: Set bastion_ip fact from Terraform output
      set_fact:
        bastion_ip: "{{ (lookup('file', '/home/jilani/playsoft-jilani-gharbi/playsoft-infra/terraform-k8s/tf_output.json') | from_json).bastion_public_ip.value }}"

# ---------------------------------------------------------------------------
# 0. Kubernetes Cluster Setup
# ---------------------------------------------------------------------------
- name: Configure Kubernetes nodes (common)
  hosts: k8s_nodes
  become: true
  tags: [k8s_cluster]
  roles:
    - common

- name: Configure Kubernetes masters
  hosts: masters
  become: true
  tags: [k8s_cluster]
  roles:
    - master
    - clone-repo-guacamole

- name: Configure Kubernetes workers
  hosts: workers
  become: true
  tags: [k8s_cluster]
  roles:
    - worker

- name: Wait for Kubernetes cluster to stabilize
  hosts: localhost
  gather_facts: false
  tags: [k8s_cluster]
  tasks:
    - name: Sleep for 120 seconds
      ansible.builtin.pause:
        seconds: 120

# ---------------------------------------------------------------------------
# 1. Proxmox: Configure VNC access on the VM
# ---------------------------------------------------------------------------
- name: Configure VNC on Proxmox
  hosts: proxmox
  become: true
  gather_facts: true
  tags: [vnc_setup]
  roles:
    - vnc_setup

# ---------------------------------------------------------------------------
# 4. Localhost: Register Guacamole connection + user via API
# ---------------------------------------------------------------------------
- name: Register Guacamole connection and user
  hosts: localhost
  become: false
  tags: [guacamole_connection]
  roles:
    - guacamole_connection

# ---------------------------------------------------------------------------
# 5. Localhost: Generate and print the direct Guacamole access URL
# ---------------------------------------------------------------------------
- name: Print direct Guacamole access URL
  hosts: localhost
  become: false
  tags: [guacamole_url]
  roles:
    - guacamole_url


