---
- name: Load Terraform output (terraform-k8s)
  set_fact:
    tf: "{{ lookup('file', tf_output_path_root) | from_json }}"

- name: Derive VM lists
  set_fact:
    linux_vm_ids_list: "{{ (tf.vnc_vm_ids.value | flatten) if (tf.vnc_vm_ids is defined and tf.vnc_vm_ids.value is defined) else [] }}"
    windows_vm_ids_list: "{{ (tf.windows_vm_ids.value | flatten) if (tf.windows_vm_ids is defined and tf.windows_vm_ids.value is defined) else [] }}"

- name: Derive candidate count across enabled connection types
  set_fact:
    candidate_count: "{{ [linux_vm_ids_list | length, windows_vm_ids_list | length] | max }}"

- name: Initialize empty lists
  set_fact:
    guac_connections: []
    guacamole_users: []

# ─── Dynamically build guacamole_connections list ──
- name: Build VNC connections list
  set_fact:
    guac_vnc_connections: >-
      {{
        guac_vnc_connections | default([]) + [{
          'name': connection_prefix ~ '-' ~ (idx + 1) ~ '-vnc',
          'protocol': 'vnc',
          'hostname': vnc_hostname,
          'port': (vnc_base_port | int + (item | int - 201)) | string,
          'username_idx': idx
        }]
      }}
  loop: "{{ linux_vm_ids_list }}"
  loop_control:
    index_var: idx
  when: "'vnc' in connection_type"

- name: Build SSH connections list
  set_fact:
    guac_ssh_connections: >-
      {{
        guac_ssh_connections | default([]) + [{
          'name': connection_prefix ~ '-' ~ (idx + 1) ~ '-ssh',
          'protocol': 'ssh',
          'hostname': vnc_hostname,
          'port': (2200 + (item | int - 200)) | string,
          'username_idx': idx,
          'parameters': {
            'username': ssh_user,
            'password': ssh_password
          }
        }]
      }}
  loop: "{{ linux_vm_ids_list }}"
  loop_control:
    index_var: idx
  when: "'ssh' in connection_type"

- name: Build Windows RDP connections list
  set_fact:
    guac_win_connections: >-
      {{
        guac_win_connections | default([]) + [{
          'name': connection_prefix ~ '-' ~ (idx + 1) ~ '-win',
          'protocol': 'rdp',
          'hostname': vnc_hostname,
          'port': (win_rdp_base_port | int + idx) | string,
          'username_idx': idx,
          'parameters': {
            'username': win_user,
            'password': win_password,
            'rdp_ignore_server_certs': rdp_ignore_server_certs | bool
          }
        }]
      }}
  loop: "{{ windows_vm_ids_list }}"
  loop_control:
    index_var: idx
  when: "'win' in connection_type"

# Merge for user assignment
- name: Merge connections for user assignment
  set_fact:
    guac_connections: "{{ (guac_vnc_connections | default([])) + (guac_ssh_connections | default([])) + (guac_win_connections | default([])) }}"

# ─── Dynamically build guacamole_users list ──
- name: Build guacamole_users list
  set_fact:
    guacamole_users: >-
      {{
        guacamole_users + [{
          'username':            user_prefix ~ (idx + 1),
          'password':            user_password_prefix ~ (idx + 1),
          'full_name':           'User ' ~ (idx + 1),
          'email':               user_prefix ~ (idx + 1) ~ '@' ~ user_email_domain,
          'organization':        user_organization,
          'allowed_connections': guac_connections | selectattr('username_idx', 'equalto', idx) | map(attribute='name') | list
        }]
      }}
  loop: "{{ range(0, candidate_count | int) | list }}"
  loop_control:
    index_var: idx

- name: Show generated users
  debug:
    msg: |
      👥 {{ guacamole_users | length }} user(s) will be provisioned:
      {% for u in guacamole_users %}
        • {{ u.username }} → connections: {{ u.allowed_connections | join(', ') }}
      {% endfor %}

# ─── Create connections ─────────────────────────────────────────────────
- name: Add Guacamole VNC connections
  scicore.guacamole.guacamole_connection:
    base_url: "http://{{ tf.bastion_public_ip.value }}/guacamole/"
    auth_username: "{{ auth_username }}"
    auth_password: "{{ auth_password }}"
    connection_name: "{{ item.name }}"
    protocol: "{{ item.protocol }}"
    hostname: "{{ item.hostname }}"
    port: "{{ item.port }}"
    max_connections: "4"
  loop: "{{ guac_vnc_connections | default([]) }}"
  loop_control:
    label: "{{ item.name }} (vnc://{{ item.hostname }}:{{ item.port }})"
  register: _vnc_connections

- name: Add Guacamole SSH connections (with auth)
  scicore.guacamole.guacamole_connection:
    base_url: "http://{{ tf.bastion_public_ip.value }}/guacamole/"
    auth_username: "{{ auth_username }}"
    auth_password: "{{ auth_password }}"
    connection_name: "{{ item.name }}"
    protocol: "{{ item.protocol }}"
    hostname: "{{ item.hostname }}"
    port: "{{ item.port }}"
    username: "{{ item.parameters.username }}"
    password: "{{ item.parameters.password }}"
    max_connections: "4"
  loop: "{{ guac_ssh_connections | default([]) }}"
  loop_control:
    label: "{{ item.name }} (ssh://{{ item.hostname }}:{{ item.port }})"
  register: _ssh_connections

- name: Add Guacamole RDP connections (with auth)
  scicore.guacamole.guacamole_connection:
    base_url: "http://{{ tf.bastion_public_ip.value }}/guacamole/"
    auth_username: "{{ auth_username }}"
    auth_password: "{{ auth_password }}"
    connection_name: "{{ item.name }}"
    protocol: "{{ item.protocol }}"
    hostname: "{{ item.hostname }}"
    port: "{{ item.port }}"
    username: "{{ item.parameters.username }}"
    password: "{{ item.parameters.password }}"
    rdp_ignore_server_certs: "{{ item.parameters.rdp_ignore_server_certs }}"
    max_connections: "4"
  loop: "{{ guac_win_connections | default([]) }}"
  loop_control:
    label: "{{ item.name }} (rdp://{{ item.hostname }}:{{ item.port }})"
  register: _win_connections

# ─── Guacamole user accounts ─────────────────────────────────────────
- name: Add Guacamole user for each entry
  scicore.guacamole.guacamole_user:
    base_url: "http://{{ tf.bastion_public_ip.value }}/guacamole/"
    auth_username: "{{ auth_username }}"
    auth_password: "{{ auth_password }}"
    username: "{{ item.username }}"
    password: "{{ item.password }}"
    full_name: "{{ item.full_name }}"
    email: "{{ item.email }}"
    organization: "{{ item.organization }}"
    allowed_connections: "{{ item.allowed_connections }}"
  loop: "{{ guacamole_users }}"
  loop_control:
    label: "{{ item.username }}"
  register: _users
  no_log: true

- name: Summary
  debug:
    msg: |
      ✅ Provisioning complete:
        • Linux VMs       : {{ linux_vm_ids_list | length }}{% if linux_vm_ids_list | length > 0 %} (IDs: {{ linux_vm_ids_list | join(', ') }}){% endif %}
        • Windows VMs     : {{ windows_vm_ids_list | length }}{% if windows_vm_ids_list | length > 0 %} (IDs: {{ windows_vm_ids_list | join(', ') }}){% endif %}
        • Users created   : {{ _users.results | selectattr('changed') | list | length }} new, {{ _users.results | rejectattr('changed') | list | length }} already existed
        • Connections     : {{ ((_vnc_connections.results | default([])) + (_ssh_connections.results | default([])) + (_win_connections.results | default([]))) | selectattr('changed') | list | length }} new, {{ ((_vnc_connections.results | default([])) + (_ssh_connections.results | default([])) + (_win_connections.results | default([]))) | rejectattr('changed') | list | length }} already existed
