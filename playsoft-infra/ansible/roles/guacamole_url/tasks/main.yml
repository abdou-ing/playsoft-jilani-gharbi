---
- name: Load Terraform output (terraform-k8s)
  set_fact:
    tf: "{{ lookup('file', tf_output_path_root) | from_json }}"

- name: Derive VM lists
  set_fact:
    linux_vm_ids_list: "{{ (tf.vnc_vm_ids.value | flatten) if (tf.vnc_vm_ids is defined and tf.vnc_vm_ids.value is defined) else [] }}"
    windows_vm_ids_list: "{{ (tf.windows_vm_ids.value | flatten) if (tf.windows_vm_ids is defined and tf.windows_vm_ids.value is defined) else [] }}"

- name: Derive candidate count across enabled connection types
  set_fact:
    candidate_count: "{{ [linux_vm_ids_list | length, windows_vm_ids_list | length] | max }}"

- name: Derive Guacamole base URL
  set_fact:
    guac_base_url: "http://{{ tf.bastion_public_ip.value }}/guacamole/"

# ─── Rebuild guacamole_users (same logic as guacamole_connection) ──
- name: Build guacamole_users list from VM count
  set_fact:
    guacamole_users: >-
      {{
        guacamole_users | default([]) + [{
          'username': user_prefix ~ (idx + 1),
          'password': user_password_prefix ~ (idx + 1)
        }]
      }}
  loop: "{{ range(0, candidate_count | int) | list }}"
  loop_control:
    index_var: idx
    label: "{{ user_prefix }}{{ idx + 1 }}"
  when: guacamole_users | length == 0


- name: Fetch token and print URL for each user
  include_tasks: per_user_url.yml
  loop: "{{ guacamole_users }}"
  loop_control:
    loop_var: guac_user
    label: "{{ guac_user.username }}"
