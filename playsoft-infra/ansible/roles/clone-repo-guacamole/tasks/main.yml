---
- name: Ensure /guacamole directory exists
  file:
    path: /guacamole
    state: directory
    mode: '0755'

- name: Clone guacamole repository
  git:
    repo: "https://github.com/abdou-ing/playsoft-jilani-gharbi.git"
    dest: "/guacamole/playsoft-jilani-gharbi"
    version: "feature/terraform"
    force: yes

- name: Apply Guacamole Kubernetes manifests
  command: >
    kubectl apply
    -n guacamole
    -f /guacamole/playsoft-jilani-gharbi/guacamole-manifest
  register: kubectl_apply

- debug:
    var: kubectl_apply.stdout_lines