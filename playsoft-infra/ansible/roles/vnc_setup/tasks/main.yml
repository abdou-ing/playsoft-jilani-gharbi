---
- name: Load Terraform output
  set_fact:
    tf: "{{ lookup('file', tf_output_path) | from_json }}"

- name: Derive VM IDs from Terraform output
  set_fact:
    vm_ids_list: "{{ tf.vm_ids.value }}"

- name: Show starting parameters
  debug:
    msg:
      - "VM IDs        : {{ vm_ids_list }}"
      - "Start display : {{ start_vnc_port }}"
      - "Max display   : {{ max_vnc_port }}"
      - "Node          : {{ node_name }}"

- name: Copy VNC port scan script to Proxmox
  copy:
    src: find_free_vnc.sh
    dest: /usr/local/bin/find_free_vnc.sh
    mode: "0755"

- name: Run VNC setup for each VM
  include_tasks: configure_vnc.yml
  loop: "{{ vm_ids_list }}"
  loop_control:
    loop_var: current_vmid
    index_var: vm_loop_index

- name: Apply pending handlers (stop/start VM)
  meta: flush_handlers

- name: Summary
  debug:
    msg: "VNC setup completed for VMs: {{ vm_ids_list }}"