apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacd
  namespace: guacamole
  labels:
    app: guacd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: guacd
  template:
    metadata:
      labels:
        app: guacd
    spec:
      containers:
      - name: guacd
        image: guacamole/guacd
        ports:
        - containerPort: 4822
          name: guacd
---
apiVersion: v1
kind: Service
metadata:
  name: guacd-clusterip
  namespace: guacamole
spec:
  selector:
    app: guacd
  ports:
  - port: 4822
    targetPort: 4822
    protocol: TCP
  type: ClusterIP

