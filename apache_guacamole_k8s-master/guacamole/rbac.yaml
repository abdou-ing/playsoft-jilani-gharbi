apiVersion: v1
kind: ServiceAccount
metadata:
  name: guacamole-sa
  namespace: guacamole
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: guacamole-role
  namespace: guacamole
rules:
- apiGroups: [""]
  resources:
    - pods
    - services
    - endpoints
    - configmaps
    - secrets
  verbs:
    - get
    - list
    - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: guacamole-rolebinding
  namespace: guacamole
subjects:
- kind: ServiceAccount
  name: guacamole-sa
  namespace: guacamole
roleRef:
  kind: Role
  name: guacamole-role
  apiGroup: rbac.authorization.k8s.io
